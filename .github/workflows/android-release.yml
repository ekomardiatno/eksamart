name: Android Release CI/CD

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate tag matches package.json version
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          PACKAGE_VERSION=$(node -p "require('./package.json').version")

          echo "Tag version: $TAG_VERSION"
          echo "Package.json version: $PACKAGE_VERSION"

          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "❌ Version mismatch! Tag ($TAG_VERSION) != package.json ($PACKAGE_VERSION)"
            exit 1
          fi

          echo "✅ Version match"

      - name: Read app name and version from package.json
        run: |
          APP_NAME=$(node -p "require('./package.json').name")
          VERSION_NAME=$(node -p "require('./package.json').version")
          echo "APP_NAME=$APP_NAME" >> $GITHUB_ENV
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV

      - name: Generate changelog from previous tag
        run: |
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          echo "Previous tag: $PREVIOUS_TAG"

          if [ -z "$PREVIOUS_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:"- %s")
          else
            CHANGELOG=$(git log ${PREVIOUS_TAG}..HEAD --pretty=format:"- %s")
          fi

          echo "CHANGELOG<<EOF" >> $GITHUB_ENV
          echo "$CHANGELOG" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE }}" | base64 -d > android/app/eksamart-key.keystore

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: ~/.gradle
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*') }}

      - name: Grant gradlew permission
        run: chmod +x android/gradlew

      - name: Apply CI Gradle overrides
        run: |
          cat >> android/gradle.properties << EOF
          org.gradle.parallel=true
          org.gradle.caching=true
          org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=512m
          reactNativeArchitectures=armeabi-v7a,arm64-v8a
          MYAPP_UPLOAD_STORE_FILE=eksamart-key.keystore
          MYAPP_UPLOAD_STORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}
          MYAPP_UPLOAD_KEY_ALIAS=${{ secrets.KEY_ALIAS }}
          MYAPP_UPLOAD_KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}
          EOF

      - name: Build AAB and APK
        run: |
          cd android
          ./gradlew bundleRelease assembleRelease -x lintVitalAnalyzeRelease -x lintVitalReportRelease

      - name: Rename build outputs with version
        run: |
          mv android/app/build/outputs/bundle/release/app-release.aab android/app/build/outputs/bundle/release/${{ env.APP_NAME }}-v${{ env.VERSION_NAME }}.aab
          mv android/app/build/outputs/apk/release/app-release.apk android/app/build/outputs/apk/release/${{ env.APP_NAME }}-v${{ env.VERSION_NAME }}.apk

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: android/app/build/outputs/bundle/release/${{ env.APP_NAME }}-v${{ env.VERSION_NAME }}.aab

      - name: Upload mapping.txt artifact
        uses: actions/upload-artifact@v4
        with:
          name: mapping-txt
          path: android/app/build/outputs/mapping/release/mapping.txt

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: android/app/build/outputs/apk/release/${{ env.APP_NAME }}-v${{ env.VERSION_NAME }}.apk

      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            android/app/build/outputs/bundle/release/${{ env.APP_NAME }}-v${{ env.VERSION_NAME }}.aab
            android/app/build/outputs/apk/release/${{ env.APP_NAME }}-v${{ env.VERSION_NAME }}.apk
            android/app/build/outputs/mapping/release/mapping.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
